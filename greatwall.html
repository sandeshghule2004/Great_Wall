<!DOCTYPE html>
<html>
<head>
<title>Great Wall</title>
<style>
body{margin:0;font-family:Arial;}
header{
height:100vh;
background:url('https://images.unsplash.com/photo-1508804185872-d7badad00f7d') no-repeat center/cover;
display:flex;justify-content:center;align-items:center;color:white;
}
section{padding:60px;text-align:center;}
.progress{
width:80%;height:20px;background:#ddd;margin:auto;
}
.bar{
height:20px;width:0;background:green;
animation:load 3s forwards;
}
@keyframes load{
to{width:90%;}
}
</style>
</head>
<body>

<header><h1>Great Wall of China</h1></header>

<section>
<h2>Length</h2>
<div class="progress">
<div class="bar"></div>
</div>
</section>

</body>
</html>
